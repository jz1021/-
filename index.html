<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>嫂嫂模拟器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #d4a5a5; --primary-dark: #b8808f; --primary-light: #f5ebe0;
  --secondary: #c9b1d4; --secondary-dark: #a78bb0; --secondary-light: #f0e6f6;
  --accent: #e8d5d0; --bg: #faf5f2; --text: #5a4a4a; --text-light: #a09090;
  --border: #e8ddd8; --card-bg: #fff9f7;
}
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, #faf5f2 0%, #f5ebe0 50%, #f0e6f6 100%);
  color: var(--text); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
}
.game-container {
  width: 100%; max-width: 880px; background: rgba(255,255,255,0.95); border-radius: 24px;
  box-shadow: 0 20px 80px rgba(168,130,140,0.15); overflow: hidden; min-height: 700px; display: flex; flex-direction: column;
}
.header { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: #fff; padding: 24px 30px; text-align: center; }
.header h1 { font-size: 26px; font-weight: 600; letter-spacing: 3px; }
.header .subtitle { font-size: 13px; opacity: 0.85; margin-top: 6px; letter-spacing: 1px; }
.main-content { flex: 1; padding: 30px; overflow-y: auto; max-height: 70vh; }
.screen-title { font-size: 22px; text-align: center; margin-bottom: 10px; color: var(--primary-dark); font-weight: 600; }
.screen-subtitle { font-size: 13px; text-align: center; color: var(--text-light); margin-bottom: 30px; }
.identity-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 10px; }
.identity-card {
  background: #fff; border: 1.5px solid var(--border); border-radius: 16px; padding: 20px 16px;
  cursor: pointer; text-align: center; transition: all 0.3s ease;
}
.identity-card:hover { border-color: var(--primary); background: var(--primary-light); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(212,165,165,0.2); }
.identity-card .card-emoji { font-size: 40px; margin-bottom: 10px; }
.identity-card .card-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.identity-card .card-subtitle { font-size: 12px; color: var(--text-light); }
.preview-panel { background: var(--card-bg); border: 1.5px solid var(--primary); border-radius: 16px; padding: 30px; text-align: center; display: none; }
.preview-panel.active { display: block; }
.preview-panel .preview-emoji { font-size: 48px; margin-bottom: 12px; }
.preview-panel .preview-title { font-size: 20px; color: var(--primary-dark); font-weight: 600; margin-bottom: 8px; }
.preview-panel .preview-subtitle { font-size: 14px; color: var(--text-light); margin-bottom: 20px; }
.preview-panel .preview-desc { font-size: 15px; line-height: 1.8; color: var(--text); margin-bottom: 25px; max-width: 500px; margin-left: auto; margin-right: auto; }
.btn { padding: 14px 32px; border: none; border-radius: 12px; font-size: 15px; cursor: pointer; font-weight: 600; transition: all 0.3s; letter-spacing: 0.5px; }
.btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(212,165,165,0.4); }
.btn-secondary { background: #fff; color: var(--text); border: 1.5px solid var(--border); }
.btn-secondary:hover { border-color: var(--primary); background: var(--primary-light); }
.btn-back { background: none; border: none; color: var(--text-light); cursor: pointer; font-size: 13px; margin-bottom: 10px; }
.btn-back:hover { color: var(--primary-dark); }
.phase-title { font-size: 16px; color: var(--secondary-dark); font-weight: 600; margin-bottom: 18px; padding-bottom: 10px; border-bottom: 2px solid var(--secondary-light); letter-spacing: 1px; }
.narrative-text { font-size: 15px; line-height: 2; color: var(--text); margin-bottom: 20px; }
.narrative-text p { margin-bottom: 16px; text-indent: 2em; }
.options-area { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
.option-btn { padding: 14px 20px; background: #fff; border: 1.5px solid var(--border); border-radius: 12px; cursor: pointer; font-size: 14px; text-align: left; transition: all 0.3s; color: var(--text); }
.option-btn:hover { border-color: var(--primary); background: var(--primary-light); transform: translateX(4px); box-shadow: 0 4px 12px rgba(212,165,165,0.15); }
.ending-box { text-align: center; padding: 30px; }
.ending-box .ending-label { font-size: 14px; color: var(--text-light); letter-spacing: 2px; margin-bottom: 8px; }
.ending-box .ending-name { font-size: 24px; color: var(--primary-dark); font-weight: 600; margin-bottom: 20px; padding: 16px; background: var(--primary-light); border-radius: 14px; display: inline-block; }
.ending-box .ending-desc { font-size: 15px; color: var(--text); line-height: 1.8; max-width: 500px; margin: 0 auto 25px; }
.scene-title { font-size: 15px; color: var(--secondary-dark); font-weight: 600; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1.5px solid var(--secondary-light); letter-spacing: 0.5px; }
.stats-panel { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; padding: 16px; background: var(--secondary-light); border-radius: 14px; margin-top: 20px; }
.stat-item { text-align: center; min-width: 60px; }
.stat-name { font-size: 11px; color: var(--text-light); }
.stat-value { font-size: 20px; font-weight: 600; color: var(--primary-dark); }
.hidden { display: none !important; }
.fade-in { animation: fadeIn 0.5s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@media (max-width: 768px) { .identity-grid { grid-template-columns: repeat(2, 1fr); } .main-content { padding: 20px; } }
</style>
</head>
<body>
<div class="game-container">
  <div class="header">
    <h1>嫂嫂模拟器</h1>
    <div class="subtitle" id="headerSubtitle">从粉丝到恋人的假想人生</div>
  </div>
  <div class="main-content" id="mainContent"></div>
</div>
<script>
// ============ GAME STATE ============
const state = {
  identity: null,
  screen: 'identity-select', // identity-select | training | upper | lower | failure | success-ending
  trainingScene: 0,
  upperPhase: 0,
  lowerPhase: 0,
  stats: { affection: 15, courage: 35, emotion: 35, charm: 25, rational: 50 }
};

// ============ IDENTITY DATA ============
const IDENTITIES = [
  { id: 'abk', emoji: '🇰🇷', title: '青梅竹马', subtitle: 'ABK发小', preview: '你从小和他一起在海外长大，他出道后你们断了联系。现在你回国了。' },
  { id: 'assistant', emoji: '🎤', title: '近水楼台', subtitle: '爱豆助理', preview: '你是公司新招的中韩双语人才，被分配到他的团队。谁也比不上你们在一起的时间，爱上他、毁了他……都在你一念之间。' },
  { id: 'fansite', emoji: '💎', title: '粉丝上位', subtitle: '顶流站姐', preview: '你是有名的站姐，设备比公司拍得还好。经纪公司主动联系了你。但站姐圈有自己的规则。' },
  { id: 'trainer', emoji: '🏋️', title: '同事情深', subtitle: '健身教练', preview: '你是运动康复专业毕业，被聘请为他的专属私教。凌晨的健身房，只有我们两个人。他上重量，我给他做保护，不说话也不尴尬。他经纪人催他回酒店，他说再练一组，谁也不会怀疑。' },
  { id: 'athlete', emoji: '🏃', title: '跨界相遇', subtitle: '运动选手', preview: '你是花样滑冰运动员。偶像运动会节目组邀请你和他搭档冰舞。' },
  { id: 'influencer', emoji: '📱', title: '流量密码', subtitle: '社媒网红', preview: '你是IG上靠氛围感vlog涨粉的网红，一次商业合作，你们建立了链接。成为嫂嫂既是你飞升顶流的密码，也能让你的黑历史被扒得底朝天，你要如何把握？' }
];

// ============ TRAINING SCENES (养成章) ============
const TRAINING = {
  abk: {
    title: '青梅竹马 · 养成章',
    scenes: [
      {
        title: '旧物',
        text: '你从海外回到国内，整理行李箱时，一本旧相册从夹层滑出来。翻开——是你和他小时候的合影。照片背面是他歪歪扭扭写的"以后一起出道"。你现在打算……',
        options: [
          { text: '拍照私信发给他从前的账号："你还记得这个吗？"', effects: {}, trap: true, failTitle: '认错旧人', failDesc: '他的旧账号早已被公司回收。你的私信被新接手的管理员截图，发到了粉丝群。粉丝群起而攻之："编故事蹭热度""哪来的戏精"。第二天他发了一条SNS：「旧人旧事，请勿打扰。」——你甚至没来得及和他重逢，就已经被拒之门外。' },
          { text: '把照片收好，先不告诉任何人', effects: { rational: 5 } }
        ]
      },
      {
        title: '粉丝会',
        text: '你把照片收好，决定先低调了解他现在的圈子。你去了一场他的粉丝见面会。散场时，旁边一个老粉认出了你——"你是不是之前在Ins发过和他的合照？"',
        options: [
          { text: '"对！我是他发小，这次回国就是来找他的"', effects: {}, trap: true, failTitle: '不实传言', failDesc: '当天晚上，你的话被做成截图发到了推特。粉丝超话炸了——"有人冒充欧巴发小""公司快来打假"。第二天经纪公司发声明："近期网络传言不实，请勿信谣。"——你说的是真的，但没有人需要真相。' },
          { text: '"你看错了，我只是普通粉丝"', effects: { rational: 8, emotion: 5 } },
          { text: '"确实认识，但那是很久以前的事了"', effects: { courage: 10 } }
        ]
      },
      {
        title: '童年的信',
        text: '你回到家，又翻了一遍旧物。在相册底层找到一封没寄出的信——是他当年写给你的。"等我出道了，你要来看我的演唱会。"你现在……',
        options: [
          { text: '去他演唱会的签售环节，排队，什么都不说', effects: { affection: 10, courage: 8 } },
          { text: '把信折好，去演唱会，只在台下看', effects: { rational: 10, emotion: 5 } }
        ],
        successText: '签售会上，排到你时，你点点头，把一张纸条推到他面前。上面只写了一行字："你当年说，要一起出道。"他愣了三秒，抬头看你。然后他笑了——那种笑，是妆发遮不住的。"是你。你回来了。"'
      }
    ]
  },
  assistant: {
    title: '近水楼台 · 养成章',
    scenes: [
      {
        title: '面试',
        text: '经纪公司的面试官翻看你的简历。"你的双语能力很出色。不过有一个问题——你对我们的艺人了解吗？"',
        options: [
          { text: '"我很喜欢BTS，从出道就开始追了"', effects: {}, trap: true, failTitle: '面试未通过', failDesc: '面试官合上简历。"谢谢你，不过我们需要的不是粉丝，是专业助理。"——你的第一条守则就写错了答案。公司会给每位落选者发同样的邮件。你是其中之一。' },
          { text: '"了解一些，主要是为了工作需要"', effects: { rational: 8 } },
          { text: '"我是行业新人，愿意从头学"', effects: { emotion: 8 } }
        ]
      },
      {
        title: '入职培训',
        text: '你通过了面试，进入入职培训。培训导师给了你一个测试——「你抽奖获得了艺人签名周边，怎么庆祝？」',
        options: [
          { text: '发社交平台长文"梦想成真！谢谢大家的支持！"', effects: {}, trap: true, failTitle: '避嫌', failDesc: '培训导师在监控账号动态。你的长文虽然没有指名，但词条被关联到了艺人相关tag。公司风控小组截图发给导师："这人不能用。"第二天你被叫进办公室——「培训期双向选择，你可以离开了。」你离他最近的一次，是拿到了他的签名。然后就没有然后了。' },
          { text: '私下告诉家人朋友，不公开发任何东西', effects: { rational: 10 } },
          { text: '发朋友圈分组可见"新工作加油"', effects: { emotion: 5 } }
        ]
      },
      {
        title: '分派',
        text: '培训结束，你被通知分派到他的团队。第一天上班，在走廊上你看到他从练习室出来，满头汗。他没注意到你。你怎么做？',
        options: [
          { text: '掏出手机偷偷拍一张他练习的背影', effects: {}, trap: true, failTitle: '还没开始就结束了', failDesc: '走廊有监控。安保团队当天下午找到你——「公司制度写得很清楚，禁止私自拍摄艺人。」你的工牌还没捂热就被收了。手机里的那张背影，是你唯一带走的东西。' },
          { text: '让路，低头，先去自己的工位报到', effects: { rational: 10, emotion: 5 } },
          { text: '主动说"你好，我是新来的助理"', effects: { courage: 8, affection: 5 } }
        ],
        successText: '你到工位坐下。十分钟后，门开了，他走进来拿行程表——看到了你。"你就是新来的助理？"你点了头。他笑了一下："以后辛苦了。请多关照。"'
      }
    ]
  },
  fansite: {
    title: '粉丝上位 · 养成章',
    scenes: [
      {
        title: '建站',
        text: '你购入了一套顶级设备，决定为他开站。第一次出图，你选在了机场。他在人群中被推搡着走，你按下快门。回到家翻看，这张角度——是他往你的方向看了一秒。你要……',
        options: [
          { text: '把照片打印出来，P上自己的脸，做成"合照"发小号', effects: {}, trap: true, failTitle: '假合照风波', failDesc: '"合照"被扒皮，其他站姐扒出原图并对比。超话开始刷——「站姐造假」「这是什么行为艺术」。你的站子一天之内掉粉到三位数，私信全是骂声。你的设备再好，也P不出真实。' },
          { text: '发布这张照片，配文「一眼万年」', effects: { charm: 8 } },
          { text: '发九宫格，这张放中间，不特别标注', effects: { charm: 5, emotion: 5 } }
        ]
      },
      {
        title: '同行',
        text: '你的站子粉丝增长很快。有前辈站姐私信你，邀你加入站姐群——但条件是，入群必须分享一次"独家料"。比如他的私人行程。你刚好有一次，路过某小区时看到他进去了。你要……',
        options: [
          { text: '分享那个小区地址，并说"他每周三都会去"', effects: {}, trap: true, failTitle: '出格', failDesc: '你的消息被截图流出。当天晚上他的公司发声明："针对近期艺人隐私泄露事件，已取证并报警。"站姐群全部清空，你的账号被永久封禁。从站姐到私生，有时候只差一条消息。' },
          { text: '礼貌拒绝入群邀请，单独活动', effects: { rational: 10 } },
          { text: '入群但只分享公开活动的拍摄心得', effects: { emotion: 10 } }
        ]
      },
      {
        title: '橄榄枝',
        text: '你的图质量越来越高，好几次被搬运到了他本人的超话封面。一天，你收到一封私信："您好，我们是XX娱乐，想和您聊一下官方合作拍摄的方案。"署名是他们公司的运营总监。你决定……',
        options: [
          { text: '立刻截图发朋友圈："终于等到这一天！姐妹们我是官方的了！"', effects: {}, trap: true, failTitle: '提前庆祝', failDesc: '运营总监看到了你朋友圈的截图（他和你有一个共同好友）。私信又来了，这次只有一句话："合作流程保密，很抱歉这次机会留给专业人士。"在你庆祝的时候，真正的站姐已经在签合同了。' },
          { text: '回复邮件，附上自己的作品集，询问具体方案', effects: { charm: 5, emotion: 5 } },
          { text: '回复邮件，同时要求合作必须包括和艺人本人对接', effects: { courage: 8 } }
        ],
        successText: '你如约去公司开会。门打开，走进来的不只是运营总监——还有他。"听说你拍了我很久了？"他坐到你对面，认真看你以前的作品。"这张……我不记得自己有过这种表情。"他指着其中一张说。"因为那时候你还没注意到我。"你回答。他抬眼："现在注意到了。"'
      }
    ]
  },
  trainer: {
    title: '同事情深 · 养成章',
    scenes: [
      {
        title: '认证',
        text: '你完成了运动康复的资格认证考试。培训机构的老师说："你的成绩很优秀。我有一句话想问你——你为什么选择这个方向？"',
        options: [
          { text: '"我想进娱乐圈，当艺人的私教"', effects: {}, trap: true, failTitle: '动机不纯', failDesc: '老师沉默了一下。"我把你的简历推给了娱乐公司——但你的这个回答，我没办法写进推荐信。"三个月后你的同学接到了经纪公司的委托。而你没有。你想走近他的第一步，自己没说好。' },
          { text: '"我想帮助更多人科学运动"', effects: { rational: 8 } },
          { text: '"这是很好的职业方向，市场需求大"', effects: { rational: 5, emotion: 5 } }
        ]
      },
      {
        title: '第一次试课',
        text: '经纪公司联系了你。你被通知去他的健身房做一次试课评估。到了才发现有五六位教练也在竞争。轮到你时，他躺在器械上，说："最近肩膀有点酸。"你怎么处理？',
        options: [
          { text: '"肩膀酸？我有一个特别的动作，保证马上见效"（未经评估直接上手调整）', effects: {}, trap: true, failTitle: '操之过急', failDesc: '你用力过猛，他肩膀"咔"了一声。之后他皱了下眉没说什么，但第二天公司通知你——「他很感谢您的时间，但团队决定选择另一位教练。」后来你听说，他肩膀那周都在冰敷。你不是他的教练。你只是另一个让他受伤的人。' },
          { text: '先做体态评估，再制定训练方案', effects: { rational: 10 } },
          { text: '从基本拉伸开始，边做边了解他的运动习惯', effects: { charm: 5, affection: 8 } }
        ]
      },
      {

        text: '你的试课通过了。第一次正式私教课，你们一对一。他练到一半突然说："你知道吗，你是第一个训练时不跟我聊偶像话题的教练。"你现在……',
        options: [
          { text: '"其实我也追过你……的团"', effects: {}, trap: true, failTitle: '粉丝入场', failDesc: '他放下哑铃，笑了一下，但那不是开心的笑。"我训练的时候不想讨论这些。"之后的课他全程没说话。下周，公司换了教练。你花了一年拿证，一句话回到原点。' },
          { text: '"你付我钱是为了训练，不是聊天"（微笑）', effects: { rational: 8, affection: 5 } },
          { text: '"如果你想聊别的，我不介意"', effects: { courage: 5, affection: 10 } }
        ],
        successText: '一个月后，他完成了你制定的第一阶段训练计划。从器械上下来，他擦了汗："你不一样。跟你训练我很放松。"他开始换鞋，停了一下："下次训练完，一起喝杯咖啡吧。"'
      }
    ]
  },
  athlete: {
    title: '跨界相遇 · 养成章',
    scenes: [
      {

    { title: 'Phase 6 · 新闻', text: '媒体拍到了他来看你比赛的照片。不是绯闻——是体育版发的："偶像运动会搭档现身花样滑冰大奖赛观众席。"两家粉丝开始拼时间线：他专门从首尔飞到釜山看你比赛，当天往返。有人开了话题 #冰舞搭档是真的吗#，你队友发截图给你——你没点开。你退出App，打开飞行模式，手机屏幕黑下去。你看到自己的脸，在想你刚才收到的最后一条消息是他发的——不是关于新闻的。是关于明天的训练。他没有提热搜。他在等你先说。' },
    { title: 'Phase 7 · 冰面之外', text: '教练的办公室在冰场二楼，窗户外头就是训练场，能看到一整条冰面。他坐在桌子那头，你是他带过的第三个奥运周期的选手。他没有拍桌子，也没有叹气。他只是推了推老花镜，说了一句：「你有天赋。但天赋需要专注。」然后他停下来——他和你都清楚他在说什么。不是训练不认真，不是技术不过关，是心不在了。你没辩解。因为他说的对——也不对。你想起自己这十几年。六岁第一次上冰，摔了不下百次。十二岁进入市队，和你一起的同期现在只剩你一个还在职业冰场上。十五岁拿到第一个全国少年组奖牌，银的，你妈说没关系，下一次一定是金牌。但金牌没来。银牌、铜牌、第四——你拿过的成绩用一个巴掌数的完。唯一一次站上国际领奖台是四年前的四大洲赛，年龄黄金期，状态巅峰。然后逐年往下。你的三周跳这两年变得不稳定，体能测试的数据教练看了之后沉默了一下，你知道沉默的含义。金妍儿只有一个。花样滑冰这个冷门项目的规则是——做不成金妍儿，最好的出路是退役后转演艺界，接商业代言，偶尔上综艺，卖自传。你不想那样。但你也不知道该怎样。这个奥运周期的积分排名你心里有数。拿牌几乎不可能。但放弃——放弃你六岁就开始了的东西、放弃冻得脚趾发疼还在冰上重复一个步伐的清晨、放弃伤得缠着绷带上场比赛的夜晚——你做不到。你没有哭。眼泪对你的训练没用。你只是坐在教练对面，沉默了很长时间，然后说：「我知道了。」' },
    { title: 'Phase 8 · 另一种冰面', text: '他知道了你的烦恼。你没说——你没打算跟他说。但他在一次训练结束后看到你坐在更衣室门口的椅子上，盯着墙发呆。他什么都没说，去买了两瓶宝矿力，一瓶贴在你脸颊上，冰的。你接过水，拧开盖，喝了一口。然后你告诉他——关于教练、排名、退役的可能性、你不知道以后会怎样。他没有马上安慰你。他问了一句话：「如果不开训练课，你以后想做什么。」你没想过。然后他又问：「如果不拿金牌，你还能留在冰上吗。」你看向他。他看回来。他说：「开一个冰舞训练中心，会不会好一点。」你愣了一瞬。他说得自然，好像不是在提议——像是在转述一个已经发生的事实。然后他开始行动了。他的人脉跨了圈子——体育综艺的PD、品牌活动策划、录过冰上节目的制作人。他把这些人介绍给你，不是为了"帮他女朋友找活儿"，是把你当做一名运动员介绍到需要运动员的地方。他没有替你说"她很厉害"，他让你自己上场去展现。两周后你收到了第一个综艺录制的邀约，接着是品牌冰上体验活动的企划邀请，然后是青少年冰舞培训的客座教练聘请。你看着这些邮件，坐在冰场边上，手机亮了一排。他说：「拿不了冠军又如何？是你让更多人知道了这项运动。培养出能拿冠军的选手就够了。你在冰上够久了——让别人来陪你滑。」你没有回答他。但你花了整个下午写了一份冰舞培训中心的商业计划，标题只有一行："关于我所知道的，关于冰面的一切。"结尾写了：「起步年龄：不限。退役选手可入。」' }
  ],
  influencer: [
    { title: 'Phase 5 · 地下', text: '你们没有官宣。你甚至不知道算不算"在一起"——但你们确实在一起。一周见两次，每次都是行程的间隙。他录完综艺来你的公寓，戴了帽子和口罩，在玄关把鞋脱了，说你的拖鞋太小，脚后跟露在外头。你去给他买过一双，但他下次来还是穿那双小的。他说习惯了。你的vlog还在更新。偶尔拍到一只手在画面边缘递咖啡，弹幕就炸。「那只手谁的手」「戒指没有 指节很细」「不会又是上次那个\'工作人员\'吧」——你什么都没说过。他也什么都没说过。但网友做的时间线比你们的聊天记录还长。他们把你们同一天发了同一个窗外天空的截图叠在一起，把你们同一时段出现在同一家咖啡馆的对比图放在九宫格里。他们的投入程度让你觉得自己不是在谈恋爱——是在拍真人秀，有一群人在帮你们写分镜本。你不确定这算不算真正意义上的"地下恋情"。因为你们明明什么都没藏，但好像全世界都在替你们藏。' },
    { title: 'Phase 6 · 扒皮', text: '有人开始往回扒你。很彻底——你三年前的旧账号、大学时的追星长文、你在粉丝群的发言截图、你做博主之前发的素颜自拍、你第一次参加线下活动时穿的那条不合身的连衣裙。全部扒出来做成了一份PDF，发在一个匿名论坛。标题是：「XX博主的追星历史——从粉丝到女朋友。」没有人骂你。做的这个人非常聪明——她只是把时间线列了出来，附上截图、日期、来源，说"供大家自行判断"。这份PDF传播速度比任何爆款都快。她不是黑粉，是一个你认识的同行——一个你曾经在活动中帮她调过光线的人。评论区分了两派。「她自己从粉丝上来的，凭什么不让别人追」，另一派：「如果她不是在利用他，为什么每条内容都有他的影子。」你看到最后一行——"她现在是不是在利用他？"是一个问句。不是陈述。一个问句。像一根针。' },
    { title: 'Phase 7 · 公开或沉默', text: '品牌方没有骂你。他们只是暂停了。你的商务对接人是一个和你说过"宝贝你太厉害了"的女生。这一次她的语气不太一样——没有宝贝了。她说可能这段时间先停一下"等你处理好"。你盯着"处理"那两个字看了很久。什么叫"处理"——解释不是，沉默不是，删除也不是。承认是恋爱吗？那PDF里的时间线会被对得更清楚。否认是恋爱吗？否认什么——你连"是"都还没说过。你关掉了手机，屏幕黑了。然后你又按亮了，打了删删了打，反复了三次。你不敢开评论区。但你开了。你往下滑——哭的、骂的、护的、看热闹的——都在。然后他的电话打进来。他没说"我看到了"。他只是问你："你在看评论区吗。"你说："嗯。"他没有问"你打算怎么回应"，没有问"要不要我发声明"，没有问"你想公开还是沉默"。他说：「我只后悔三年前不认识你。」' },
    { title: 'Phase 8 · 结局', text: '挂了电话你坐在沙发上看着天花板。一个小时后手机炸了。是品牌对接人先发的消息：「快看他IG。」括号，三个感叹号。他在IG上发了一张你和他的合照。就是第一次联动拍摄时那张——你蹲在地上调反光板，他站在旁边看。不是摆拍，是品牌方的花絮师拍的，你从来没看到过这张。角度是他的侧后方，但他没有看镜头。照片里的他在看你。配文是这样写的：「她调光比我拍的好。」没有"这是我女朋友"。没有声明。没有解释。就一句话。但所有人在那一秒都懂了。你的评论区被同一句话刷屏——"嫂子。""嫂子好。""嫂子早。"然后品牌那个对接人又发了消息：「刚刚说的那个\'暂停\'。收回了。你什么时候有空？我们想用他发的那张做下一期主视觉。」你看了一下那张照片——他视角里的你，蹲在地上调反光板，头发快散了，嘴角咬着，表情认真。你不记得那天有人拍了这张。你问他这张谁拍的。他说：「小泽拍的。」你搜了半天小泽是谁。然后才反应过来——他在说他自己。他原来会用第三人称。你认识他这么久，第一次知道他管自己叫小泽。' }
  ]
};

// ============ RENDER FUNCTIONS ============
const mc = document.getElementById('mainContent');
const subtitle = document.getElementById('headerSubtitle');

function clearMain() { mc.innerHTML = ''; }

function setPhaseTitle(identityId) {
  const iden = IDENTITIES.find(i => i.id === identityId);
  if (iden) subtitle.textContent = iden.emoji + ' ' + iden.title + ' · ' + iden.subtitle;
}

// Identity selection
function renderIdentitySelect() {
  clearMain();
  state.screen = 'identity-select';
  subtitle.textContent = '从粉丝到恋人的假想人生';
  let html = '<div class="screen-title">选择你的身份</div>';
  html += '<div class="screen-subtitle">点击卡片查看详情</div>';
  html += '<div class="identity-grid">';
  IDENTITIES.forEach(idn => {
    html += `<div class="identity-card" onclick="showPreview('${idn.id}')">
      <div class="card-emoji">${idn.emoji}</div>
      <div class="card-title">${idn.title}</div>
      <div class="card-subtitle">${idn.subtitle}</div>
    </div>`;
  });
  html += '</div>';
  html += '<div class="preview-panel" id="previewPanel"></div>';
  mc.innerHTML = html;
}

function showPreview(identityId) {
  const idn = IDENTITIES.find(i => i.id === identityId);
  const panel = document.getElementById('previewPanel');
  panel.className = 'preview-panel active fade-in';
  panel.innerHTML = `
    <div class="preview-emoji">${idn.emoji}</div>
    <div class="preview-title">${idn.title}<span style="font-size:14px;color:var(--text-light);margin-left:8px;">${idn.subtitle}</span></div>
    <div class="preview-desc">${idn.preview}</div>
    <button class="btn btn-primary" onclick="selectIdentity('${idn.id}')">选择这个身份</button>
    <button class="btn btn-secondary" style="margin-left:10px;" onclick="closePreview()">再看看</button>
  `;
}

function closePreview() {
  document.getElementById('previewPanel').className = 'preview-panel';
}

// Start training chapter
function selectIdentity(identityId) {
  state.identity = identityId;
  state.trainingScene = 0;
  setPhaseTitle(identityId);
  showPreTrainingReveal();
}

function showPreTrainingReveal() {
  clearMain();
  const idn = IDENTITIES.find(i => i.id === state.identity);
  const training = TRAINING[state.identity];
  let html = '<div class="screen-title fade-in">根据你选择的身份</div>';
  html += `<div style="text-align:center;font-size:28px;margin:20px 0;">${idn.emoji}</div>`;
  html += `<div style="text-align:center;font-size:20px;color:var(--primary-dark);font-weight:600;margin-bottom:8px;">${idn.title}（${idn.subtitle}）</div>`;
  html += `<div style="text-align:center;font-size:15px;color:var(--text);line-height:1.8;max-width:500px;margin:0 auto 10px;">${idn.preview}</div>`;
  html += `<div style="text-align:center;font-size:14px;color:var(--secondary-dark);margin:20px 0;">你需先达成${idn.subtitle}身份，才能开启嫂嫂上位之旅。</div>`;
  html += `<div style="text-align:center;"><button class="btn btn-primary" onclick="startTraining()">进入养成章</button></div>`;
  mc.innerHTML = html;
}

function startTraining() {
  state.trainingScene = 0;
  state.screen = 'training';
  renderTrainingScene();
}

function renderTrainingScene() {
  clearMain();
  const training = TRAINING[state.identity];
  const scenes = training.scenes;
  const idx = state.trainingScene;

  if (idx >= scenes.length) {
    trainingSuccess();
    return;
  }

  const scene = scenes[idx];
  let html = `<div class="scene-title">${training.title} · 场景 ${idx + 1}/${scenes.length}</div>`;
  html += `<div class="scene-title" style="font-weight:400;color:var(--text);border:none;">${scene.title}</div>`;
  html += `<div class="narrative-text"><p>${scene.text}</p></div>`;
  html += '<div class="options-area">';
  scene.options.forEach((opt, oi) => {
    html += `<button class="option-btn" onclick="selectTrainingOption(${oi})">${opt.text}</button>`;
  });
  html += '</div>';
  mc.innerHTML = html;
}

function selectTrainingOption(optionIndex) {
  const scene = TRAINING[state.identity].scenes[state.trainingScene];
  const opt = scene.options[optionIndex];

  if (opt.trap) {
    clearMain();
    state.screen = 'failure';
    let html = '<div class="ending-box fade-in">';
    html += '<div class="ending-label">养成失败</div>';
    html += `<div class="ending-name">「${opt.failTitle}」</div>`;
    html += `<div class="ending-desc">${opt.failDesc}</div>`;
    html += `<button class="btn btn-primary" onclick="restartGame()">重新开始</button>`;
    html += '</div>';
    mc.innerHTML = html;
    return;
  }

  for (let k in opt.effects) {
    if (state.stats[k] !== undefined) {
      state.stats[k] = Math.max(0, Math.min(100, state.stats[k] + opt.effects[k]));
    }
  }

  state.trainingScene++;
  const scenes = TRAINING[state.identity].scenes;

  // Show onSuccess or successText if present on the just-completed scene
  const prevScene = scenes[state.trainingScene - 1];
  if (state.trainingScene >= scenes.length) {
    trainingSuccess();
  } else if (prevScene.onSuccess) {
    clearMain();
    let html = '<div class="fade-in">';
    html += `<div class="narrative-text"><p>${prevScene.onSuccess}</p></div>`;
    html += `<div style="text-align:center;margin-top:15px;"><button class="btn btn-primary" onclick="renderTrainingScene()">继续</button></div>`;
    html += '</div>';
    mc.innerHTML = html;
  } else {
    renderTrainingScene();
  }
}

function trainingSuccess() {
  clearMain();
  state.screen = 'upper';
  state.upperPhase = 0;
  const training = TRAINING[state.identity];
  const lastScene = training.scenes[training.scenes.length - 1];
  const idn = IDENTITIES.find(i => i.id === state.identity);

  let html = '<div class="fade-in">';
  html += '<div class="scene-title" style="color:var(--secondary-dark);font-weight:600;">养成完成</div>';
  html += `<div class="narrative-text"><p>${lastScene.successText}</p></div>`;
  html += `<div style="text-align:center;margin-top:20px;"><button class="btn btn-primary" onclick="startUpperChapter()">继续</button></div>`;
  html += '</div>';
  mc.innerHTML = html;
}

// Upper chapter (narrative phases)
function startUpperChapter() {
  state.screen = 'upper';
  state.upperPhase = 0;
  renderUpperPhase();
}

function renderUpperPhase() {
  clearMain();
  const phases = UPPER[state.identity];
  if (state.upperPhase >= phases.length) {
    startLowerChapter();
    return;
  }
  const phase = phases[state.upperPhase];
  let html = '<div class="fade-in">';
  html += `<div class="phase-title">${phase.title}</div>`;
  html += `<div class="narrative-text"><p>${phase.text}</p></div>`;
  html += `<div style="text-align:center;margin-top:20px;">`;
  html += `<button class="btn btn-primary" onclick="nextUpperPhase()">继续</button>`;
  html += '</div></div>';
  mc.innerHTML = html;
}

function nextUpperPhase() {
  state.upperPhase++;
  renderUpperPhase();
}

// Lower chapter (narrative phases)
function startLowerChapter() {
  state.screen = 'lower';
  state.lowerPhase = 0;

  // Show transition
  clearMain();
  const idn = IDENTITIES.find(i => i.id === state.identity);
  let html = '<div class="fade-in" style="text-align:center;padding:30px;">';
  html += `<div style="font-size:16px;color:var(--secondary-dark);margin-bottom:12px;">上章完结</div>`;
  html += `<div style="font-size:14px;color:var(--text-light);margin-bottom:25px;">你们确认了彼此的心意。但故事才刚刚开始。</div>`;
  html += `<div class="chapter-transition" style="background:linear-gradient(135deg,var(--primary-light),var(--secondary-light));border-radius:16px;padding:30px;margin-bottom:20px;">`;
  html += `<h2 style="font-size:22px;color:var(--secondary-dark);margin-bottom:8px;">下章</h2>`;
  html += `<p style="font-size:14px;color:var(--text);">在一起之后，外界压力、内心考验、命运的岔路口——都在前方等待。</p>`;
  html += '</div>';
  html += `<button class="btn btn-primary" onclick="renderLowerPhase()">进入下章</button>`;
  html += '</div>';
  mc.innerHTML = html;
}

function renderLowerPhase() {
  clearMain();
  const phases = LOWER[state.identity];
  if (state.lowerPhase >= phases.length) {
    showFinalEnding();
    return;
  }
  const phase = phases[state.lowerPhase];
  let html = '<div class="fade-in">';
  html += `<div class="phase-title">${phase.title}</div>`;
  html += `<div class="narrative-text"><p>${phase.text}</p></div>`;
  html += `<div style="text-align:center;margin-top:20px;">`;
  html += `<button class="btn btn-primary" onclick="nextLowerPhase()">继续</button>`;
  html += '</div></div>';
  mc.innerHTML = html;
}

function nextLowerPhase() {
  state.lowerPhase++;
  renderLowerPhase();
}

// Final ending
function showFinalEnding() {
  clearMain();
  state.screen = 'success-ending';
  const idn = IDENTITIES.find(i => i.id === state.identity);
  let html = '<div class="ending-box fade-in">';
  html += '<div class="ending-label">全章完结</div>';
  html += `<div class="ending-name">${idn.emoji} ${idn.title} · ${idn.subtitle}</div>`;
  html += '<div class="ending-desc">故事暂告一段落。感谢你陪她从养成走到今天。</div>';
  html += '<div style="margin-top:15px;font-size:13px;color:var(--text-light);">—— 嫂嫂模拟器 ——</div>';
  html += `<div style="margin-top:25px;"><button class="btn btn-primary" onclick="restartGame()">重新开始</button></div>`;
  html += '</div>';
  mc.innerHTML = html;
}

function restartGame() {
  state.identity = null;
  state.screen = 'identity-select';
  state.trainingScene = 0;
  state.upperPhase = 0;
  state.lowerPhase = 0;
  state.stats = { affection: 15, courage: 35, emotion: 35, charm: 25, rational: 50 };
  renderIdentitySelect();
}

// ============ INIT ============
renderIdentitySelect();
</script>
</body>
</html>
